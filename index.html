<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>お墓の健康診断書 | みやこ磨き</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin:0; padding:0; background:#f0ede6; font-family: 'Noto Sans JP', -apple-system, 'Hiragino Sans', sans-serif; }
  .app { max-width:480px; margin:0 auto; background:#fff; min-height:100vh; }
  .serif { font-family: 'Noto Serif JP', serif; }
  .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,.3); border-top-color:#c9a961; border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  button { font-family: inherit; }
  input { font-family: inherit; }
</style>
</head>
<body>
<div id="app" class="app"></div>

<script>
// ⚙️ LINE公式アカウントURL（後で差し替え）
var LINE_OFFICIAL_URL = "https://lin.ee/XXXXXXX";

var GRADES = {
  A:{label:"良好",color:"#2E7D32",bg:"#E8F5E9",mark:"✓"},
  B:{label:"軽微な劣化",color:"#F57F17",bg:"#FFF9C4",mark:"△"},
  C:{label:"要メンテナンス",color:"#E65100",bg:"#FFF3E0",mark:"!"},
  D:{label:"早急な対応必要",color:"#B71C1C",bg:"#FFEBEE",mark:"!!"}
};
var PLANS = [
  {name:"梅",title:"真心お墓参り代行",items:"合掌・簡易清掃・献花・写真報告",color:"#E8A0BF",bg:"#FFF0F5",best:false},
  {name:"竹",title:"標準クリーニング",items:"梅+洗剤洗浄・コケ水垢除去",color:"#4CAF50",bg:"#F1F8E9",best:true},
  {name:"松",title:"プレミアム再生研磨",items:"竹+特殊研磨・撥水コーティング",color:"#FFB300",bg:"#FFFDE7",best:false}
];

// State
var state = {
  photos: [],
  cust: { name:"", location:"", temple:"", phone:"" },
  busy: false,
  result: null,
  err: "",
  status: "",
  tab: "input"
};

// ─── Image compression ───
function compressImage(dataUrl, maxPx, quality) {
  return new Promise(function(resolve) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) {
        if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
        else { w = Math.round(w * maxPx / h); h = maxPx; }
      }
      var cv = document.createElement("canvas");
      cv.width = w; cv.height = h;
      cv.getContext("2d").drawImage(img, 0, 0, w, h);
      resolve(cv.toDataURL("image/jpeg", quality));
    };
    img.onerror = function(){ resolve(null); };
    img.src = dataUrl;
  });
}

function fmtVal(value, confidence, fallback) {
  if (!value) return fallback || "—";
  if (confidence === "低") return fallback || "不明";
  return value;
}

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

// ─── Rendering ───
function render() {
  var root = document.getElementById("app");
  root.innerHTML = headerHTML() + tabsHTML() + (state.tab === "input" ? inputHTML() : resultHTML());
  attachHandlers();
}

function headerHTML() {
  return '<div style="background:linear-gradient(135deg,#1a1a2e,#2d2d44,#1a1a2e);padding:18px 20px 14px;text-align:center;border-bottom:3px solid #c9a961;">' +
    '<div class="serif" style="font-size:12px;color:#c9a961;letter-spacing:6px;margin-bottom:5px;">みやこ磨き</div>' +
    '<div class="serif" style="font-size:19px;color:#fff;font-weight:700;letter-spacing:3px;">お墓の健康診断書</div>' +
  '</div>';
}

function tabsHTML() {
  var hasResult = !!state.result;
  return '<div style="display:flex;border-bottom:1px solid #e0e0e0;background:#fafafa;">' +
    '<button data-tab="input" style="flex:1;padding:10px 4px;border:none;background:transparent;border-bottom:' + (state.tab==="input"?"3px solid #c9a961":"3px solid transparent") + ';font-size:12px;font-weight:' + (state.tab==="input"?600:400) + ';color:' + (state.tab==="input"?"#1a1a2e":"#888") + ';cursor:pointer;">📝 入力</button>' +
    '<button data-tab="result" ' + (hasResult?"":"disabled") + ' style="flex:1;padding:10px 4px;border:none;background:transparent;border-bottom:' + (state.tab==="result"?"3px solid #c9a961":"3px solid transparent") + ';font-size:12px;font-weight:' + (state.tab==="result"?600:400) + ';color:' + (hasResult?(state.tab==="result"?"#1a1a2e":"#888"):"#ccc") + ';cursor:' + (hasResult?"pointer":"not-allowed") + ';">📋 結果</button>' +
  '</div>';
}

function inputHTML() {
  var photosHTML = state.photos.map(function(p) {
    return '<div style="position:relative;">' +
      '<img src="' + p.dataUrl + '" alt="" style="width:100%;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e0e0e0;">' +
      '<button data-remove="' + p.id + '" style="position:absolute;top:-5px;right:-5px;width:20px;height:20px;border-radius:50%;border:none;background:#d32f2f;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;">×</button>' +
    '</div>';
  }).join("");

  var custFields = [["name","ご依頼者名","山田 太郎"],["location","墓所在地","京都市東山区 ○○霊園"],["temple","寺院名（任意）","○○寺"],["phone","連絡先（任意）","090-xxxx-xxxx"]];
  var custHTML = custFields.map(function(f){
    return '<div><label style="display:block;font-size:11px;font-weight:500;color:#555;margin-bottom:3px;">' + f[1] + '</label>' +
      '<input data-cust="' + f[0] + '" type="text" value="' + esc(state.cust[f[0]]) + '" placeholder="' + f[2] + '" style="width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:8px;font-size:14px;background:#fafafa;outline:none;"></div>';
  }).join("");

  var canRun = state.photos.length > 0 && !state.busy;
  var btnLabel = state.busy
    ? '<span class="spinner"></span> ' + esc(state.status || "AI分析中...")
    : '🔍 AI診断を実行';

  return '<div>' +
    '<div style="padding:16px 20px;">' +
      '<div class="serif" style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:10px;">📷 墓石写真 <span style="color:#d32f2f;font-size:12px;font-weight:500;">（必須）</span></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;">' +
        '<button data-cam style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:none;border-radius:10px;background:#1a1a2e;color:#fff;cursor:pointer;"><span style="font-size:22px;">📸</span><span style="font-size:12px;">カメラで撮影</span></button>' +
        '<button data-gal style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:14px 8px;border:none;border-radius:10px;background:#5c5c7a;color:#fff;cursor:pointer;"><span style="font-size:22px;">🖼</span><span style="font-size:12px;">写真を選択</span></button>' +
        '<input id="camInput" type="file" accept="image/*" capture="environment" style="display:none;">' +
        '<input id="galInput" type="file" accept="image/*" multiple style="display:none;">' +
      '</div>' +
      (state.photos.length > 0 ? '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-bottom:12px;">' + photosHTML + '</div>' : "") +
    '</div>' +
    '<div style="height:1px;background:#eee;margin:0 20px;"></div>' +
    '<div style="padding:16px 20px;">' +
      '<div class="serif" style="font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:10px;">👤 顧客情報</div>' +
      '<div style="display:grid;gap:10px;">' + custHTML + '</div>' +
    '</div>' +
    '<div style="padding:0 20px 12px;">' +
      '<button id="runBtn" ' + (canRun?"":"disabled") + ' style="width:100%;padding:14px;border:none;border-radius:10px;background:' + (canRun?"linear-gradient(135deg,#1a1a2e,#2d2d44)":"#ccc") + ';color:#fff;font-size:15px;font-weight:600;cursor:' + (canRun?"pointer":"not-allowed") + ';letter-spacing:2px;" class="serif">' + btnLabel + '</button>' +
    '</div>' +
    (state.status && !state.err ? '<div style="padding:0 20px 12px;"><div style="background:#E3F2FD;border:1px solid #90CAF9;border-radius:10px;padding:10px;text-align:center;font-size:12px;color:#1565C0;font-weight:500;">' + esc(state.status) + '</div></div>' : "") +
    (state.err ? '<div style="padding:0 20px 16px;"><div style="background:#FFEBEE;border:1px solid #EF9A9A;border-radius:10px;padding:12px;"><div style="font-size:13px;font-weight:600;color:#C62828;margin-bottom:4px;">エラー</div><div style="font-size:12px;color:#555;line-height:1.5;word-break:break-all;">' + esc(state.err) + '</div></div></div>' : "") +
  '</div>';
}

function resultHTML() {
  if (!state.result) return '<div style="padding:40px 20px;text-align:center;color:#999;font-size:13px;">入力タブから診断を実行してください</div>';
  var r = state.result;
  var g = GRADES[r.overall_grade] || GRADES.B;
  var now = new Date();
  var nxt = new Date(now);
  nxt.setMonth(nxt.getMonth() + (r.next_inspection_months || 6));
  var det = r.deterioration || [];
  var sz = r.estimated_size;
  var sizeText = sz && sz.confidence !== "低" ? sz.width_cm + "x" + sz.depth_cm + "x" + sz.height_cm + "cm" : "不明";
  var sizeConfText = (sz && sz.confidence) || "不明";

  var cardSt = 'background:#f8f6f0;border-radius:10px;padding:14px;margin-bottom:14px;';
  var aiNotice = '<div style="font-size:9px;color:#999;font-weight:500;font-style:italic;">※ AI画像分析による概算評価です</div>';

  var detHTML = det.length === 0
    ? '<div style="font-size:12px;color:#888;">劣化は検出されませんでした</div>'
    : det.map(function(d, i) {
        var c = d.severity === "重度" ? "#d32f2f" : d.severity === "中度" ? "#ef6c00" : "#2e7d32";
        return '<div style="padding:8px 0;border-bottom:' + (i < det.length-1 ? "1px solid #e8e0d0" : "none") + ';">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;"><span style="font-weight:600;font-size:13px;color:#333;">' + esc(d.type) + '</span><span style="background:' + c + ';color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;">' + esc(d.severity) + '</span></div>' +
          '<div style="font-size:11px;color:#777;">箇所：' + esc(d.location) + '</div>' +
          '<div style="font-size:12px;color:#555;margin-top:3px;line-height:1.5;">' + esc(d.description) + '</div>' +
        '</div>';
      }).join("");

  var picsHTML = state.photos.length > 0
    ? '<div style="' + cardSt + '"><div style="font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0d8c8;">現状写真</div>' +
      '<div style="display:grid;grid-template-columns:' + (state.photos.length === 1 ? "1fr" : "1fr 1fr") + ';gap:6px;">' +
      state.photos.map(function(p){ return '<img src="' + p.dataUrl + '" alt="" style="width:100%;height:120px;object-fit:cover;border-radius:6px;">'; }).join("") +
      '</div></div>'
    : "";

  var plansHTML = PLANS.map(function(p){
    return '<div style="background:' + p.bg + ';border:' + (p.best ? "2px solid " + p.color : "1px solid #e0e0e0") + ';border-radius:10px;padding:12px;position:relative;">' +
      (p.best ? '<div style="position:absolute;top:-8px;right:10px;background:' + p.color + ';color:#fff;font-size:9px;padding:2px 8px;border-radius:8px;font-weight:700;">おすすめ</div>' : "") +
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span class="serif" style="background:' + p.color + ';color:#fff;font-size:11px;font-weight:800;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">' + p.name + '</span>' +
        '<div style="flex:1;"><div style="font-size:13px;font-weight:600;color:#333;">' + p.title + '</div><div style="font-size:11px;color:#777;margin-top:2px;">' + p.items + '</div></div>' +
      '</div>' +
    '</div>';
  }).join("");

  return '<div style="padding:16px 20px;">' +
    // Grade
    '<div style="background:' + g.bg + ';border:2px solid ' + g.color + ';border-radius:12px;padding:16px;text-align:center;margin-bottom:16px;">' +
      '<div style="font-size:11px;color:#666;">総合評価</div>' +
      '<div class="serif" style="font-size:44px;font-weight:800;color:' + g.color + ';line-height:1;">' + esc(r.overall_grade) + '</div>' +
      '<div style="font-size:15px;font-weight:600;color:' + g.color + ';margin-top:2px;">' + g.mark + ' ' + g.label + '</div>' +
    '</div>' +
    // Basic info
    '<div style="' + cardSt + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0d8c8;"><div style="font-size:13px;font-weight:600;color:#1a1a2e;">基本情報</div>' + aiNotice + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
        '<div><div style="font-size:10px;color:#999;">石種</div><div style="font-size:13px;font-weight:500;color:#333;">' + esc(fmtVal(r.stone_type, r.stone_type_confidence, "不明")) + '</div></div>' +
        '<div><div style="font-size:10px;color:#999;">建墓推定年数</div><div style="font-size:13px;font-weight:500;color:#333;">' + esc(fmtVal(r.estimated_age, r.estimated_age_confidence, "不定")) + '</div></div>' +
        '<div><div style="font-size:10px;color:#999;">推定サイズ</div><div style="font-size:13px;font-weight:500;color:#333;">' + esc(sizeText) + '</div></div>' +
        '<div><div style="font-size:10px;color:#999;">サイズ精度</div><div style="font-size:13px;font-weight:500;color:#333;">' + esc(sizeConfText) + '</div></div>' +
      '</div>' +
    '</div>' +
    // Deterioration
    '<div style="' + cardSt + '">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0d8c8;"><div style="font-size:13px;font-weight:600;color:#1a1a2e;">劣化診断詳細</div>' + aiNotice + '</div>' +
      detHTML +
    '</div>' +
    // Photos
    picsHTML +
    // Recommendation
    '<div style="' + cardSt + '">' +
      '<div style="font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0d8c8;">推奨施工・次回診断</div>' +
      '<div style="font-size:13px;color:#333;line-height:1.7;margin-bottom:8px;">' + esc(r.recommended_service) + '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
        '<div style="background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #e0d8c8;"><div style="font-size:10px;color:#999;">推奨施工時期</div><div style="font-size:13px;font-weight:600;color:#c9a961;">' + esc(r.recommended_timing) + '</div></div>' +
        '<div style="background:#fff;border-radius:8px;padding:8px;text-align:center;border:1px solid #e0d8c8;"><div style="font-size:10px;color:#999;">次回診断目安</div><div style="font-size:13px;font-weight:600;color:#c9a961;">' + nxt.getFullYear() + '年' + (nxt.getMonth()+1) + '月</div></div>' +
      '</div>' +
    '</div>' +
    (r.notes ? '<div style="background:#fffde7;border:1px solid #fff176;border-radius:10px;padding:12px;margin-bottom:14px;"><div style="font-size:11px;font-weight:600;color:#f57f17;margin-bottom:3px;">⚠ その他所見</div><div style="font-size:12px;color:#555;line-height:1.6;">' + esc(r.notes) + '</div></div>' : "") +
    // Plans
    '<div style="font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #e0d8c8;">お見積り概算プラン</div>' +
    '<div style="font-size:11px;color:#999;margin-bottom:10px;">※ 正式なお見積りは現地確認後にご提案いたします</div>' +
    '<div style="display:grid;gap:8px;margin-bottom:14px;">' + plansHTML + '</div>' +
    // LINE button
    '<a href="' + LINE_OFFICIAL_URL + '" target="_blank" rel="noopener noreferrer" style="text-decoration:none;">' +
      '<div style="background:linear-gradient(135deg,#06C755,#00B900);color:#fff;padding:14px 20px;border-radius:12px;text-align:center;margin-bottom:16px;box-shadow:0 4px 12px rgba(6,199,85,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;">' +
        '<span style="background:#fff;color:#06C755;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;">L</span>' +
        '<div style="text-align:left;"><div style="font-size:15px;font-weight:700;letter-spacing:1px;">簡易見積もりを進める</div><div style="font-size:10px;opacity:.9;margin-top:2px;">LINE公式アカウントでご相談</div></div>' +
      '</div>' +
    '</a>' +
    // Footer
    '<div style="border-top:2px solid #c9a961;padding-top:12px;text-align:center;">' +
      '<div class="serif" style="font-size:13px;color:#1a1a2e;font-weight:600;">みやこ磨き</div>' +
      '<div style="font-size:10px;color:#999;margin-top:3px;">診断日：' + now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日' + (state.cust.name ? ' ｜ ' + esc(state.cust.name) + ' 様' : "") + '</div>' +
    '</div>' +
  '</div>';
}

// ─── Event handlers ───
function attachHandlers() {
  // Tabs
  document.querySelectorAll("[data-tab]").forEach(function(b){
    b.addEventListener("click", function(){
      var t = b.getAttribute("data-tab");
      if (t === "result" && !state.result) return;
      state.tab = t; render();
    });
  });

  // Photo buttons
  var cam = document.querySelector("[data-cam]");
  var gal = document.querySelector("[data-gal]");
  if (cam) cam.addEventListener("click", function(){ document.getElementById("camInput").click(); });
  if (gal) gal.addEventListener("click", function(){ document.getElementById("galInput").click(); });

  var camInput = document.getElementById("camInput");
  var galInput = document.getElementById("galInput");
  if (camInput) camInput.addEventListener("change", handleFiles);
  if (galInput) galInput.addEventListener("change", handleFiles);

  // Remove photo
  document.querySelectorAll("[data-remove]").forEach(function(b){
    b.addEventListener("click", function(){
      var id = parseFloat(b.getAttribute("data-remove"));
      state.photos = state.photos.filter(function(p){ return p.id !== id; });
      render();
    });
  });

  // Customer inputs
  document.querySelectorAll("[data-cust]").forEach(function(inp){
    inp.addEventListener("input", function(){
      var k = inp.getAttribute("data-cust");
      state.cust[k] = inp.value;
    });
  });

  // Run button
  var run = document.getElementById("runBtn");
  if (run) run.addEventListener("click", runDiagnosis);
}

function handleFiles(e) {
  Array.from(e.target.files).forEach(function(f){
    var rd = new FileReader();
    rd.onload = function(ev){
      state.photos.push({ id: Date.now() + Math.random(), dataUrl: ev.target.result, file: f });
      render();
    };
    rd.readAsDataURL(f);
  });
  e.target.value = "";
}

// ─── API call ───
async function runDiagnosis() {
  if (!state.photos.length || state.busy) return;
  state.busy = true;
  state.err = "";
  state.status = "📷 写真を圧縮中...";
  render();

  try {
    // Compress images
    var compressed = [];
    for (var i = 0; i < Math.min(state.photos.length, 2); i++) {
      state.status = "📷 写真を圧縮中... (" + (i+1) + "/" + Math.min(state.photos.length, 2) + ")";
      render();
      var small = await compressImage(state.photos[i].dataUrl, 800, 0.6);
      if (small) compressed.push({ base64: small.split(",")[1], mediaType: "image/jpeg" });
    }
    if (compressed.length === 0) throw new Error("写真の圧縮に失敗");

    state.status = "🤖 AIが分析中...";
    render();

    var resp = await fetch("/api/diagnose", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ images: compressed })
    });

    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || "API Error " + resp.status);
    if (!data.result) throw new Error("診断結果なし");

    state.result = data.result;
    state.tab = "result";
    state.status = "";
  } catch (e) {
    state.err = e.message || String(e);
    state.status = "";
  }
  state.busy = false;
  render();
}

// Initial render
render();
</script>
</body>
</html>
